name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Build admin assets
        run: |
          npm ci
          npm run build

      - name: Build plugin zip
        run: |
          PLUGIN_SLUG=cache-tags-for-cloudflare
          mkdir -p dist/${PLUGIN_SLUG}
          rsync -a --exclude-from=.distignore ./ dist/${PLUGIN_SLUG} \
            --exclude dist --exclude .git
          cd dist
          zip -r ../${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}

      - name: Attach zip to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: cache-tags-for-cloudflare.zip

      # Optional: deploy to the WordPress.org plugin repository.
      # Enable by setting the `DEPLOY_TO_WPORG` repository variable to `true`
      # and adding SVN_USERNAME / SVN_PASSWORD repository secrets.
      - name: Deploy to WordPress.org
        if: ${{ vars.DEPLOY_TO_WPORG == 'true' }}
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: cache-tags-for-cloudflare
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
