name: Feature request
description: Suggest an idea or enhancement for Cache Tags for Cloudflare.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this solve, or what need does it address?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related hooks/filters, or anything else that helps.
    validations:
      required: false
