name: Bug report
description: Report a problem with Cache Tags for Cloudflare.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs if available.
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.1.0
    validations:
      required: true
  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 6.8
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3
    validations:
      required: true
  - type: dropdown
    id: multisite
    attributes:
      label: Multisite?
      options:
        - "No"
        - "Yes — subdirectory"
        - "Yes — subdomain / domain-mapped"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Cloudflare plan, relevant filters/hooks, screenshots, or anything else.
    validations:
      required: false
